name: Robô Acerto Games

on:
  schedule:
   - cron: "0 12,17,22,0 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  coletar-e-escrever:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Rodar o robô
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/robo.mjs

      - name: Commitar matérias novas
        run: |
          git config user.name "brunofvprieto"
          git config user.email "brunofvprieto@users.noreply.github.com"
          mkdir -p content/rascunhos content/publicados
          git add -A content
          if git diff --cached --quiet; then
            echo "Nenhuma matéria nova."
          else
            git commit -m "🤖 Novas matérias do robô"
            git push
          fi
